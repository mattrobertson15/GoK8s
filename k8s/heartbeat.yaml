apiVersion: apps/v1
kind: Deployment
metadata:
  name: heartbeat
  labels:
    app: heartbeat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: heartbeat
  template:
    metadata:
      labels:
        app: heartbeat
    spec:
      containers:
        - name: heartbeat
          image: ghcr.io/bartr/heartbeat:0.4.0
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: heartbeat
  labels:
    app: heartbeat
spec:
  selector:
    app: heartbeat
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: heartbeat
  labels:
    app: heartbeat
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /heartbeat
            pathType: Prefix
            backend:
              service:
                name: heartbeat
                port:
                  name: http
